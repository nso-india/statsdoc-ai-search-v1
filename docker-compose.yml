services:
  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
      - "5678:5678"  # For debugging
    depends_on:
      - db
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_APP_NAME=MOSPI
      - VITE_APP_VERSION=1.0.0
      - VITE_APP_DESCRIPTION=Document Processing and Analysis Platform
      - VITE_REMOTE_BACKEND_HOST=mospiapi.edubildai.com
      - VITE_LOCAL_BACKEND_HOST=localhost:8000
      - VITE_OPENAI_API_URL=https://api.openai.com/v1
      # Add VITE_OPENAI_API_KEY as needed
    env_file: 
      - ./frontend/.env.production

  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

  file_data_db:
    image: postgres:14
    volumes:
      - file_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: 7wOV7d2Uxr8L0YXNJqoxnwJVqvz8e9mQ

  redis:
    image: redis:7

  celery:
    build: .
    command: bash deploy-celery.sh
    volumes:
      - .:/app
    ports:
      - "5679:5678"  # For debugging
    depends_on:
      - redis
      - web
      - db
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama
    pull_policy: missing
    tty: true
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - /home/ubuntu/ollama/ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  docling-serve:
      image: ghcr.io/docling-project/docling-serve-cu126:main
      container_name: docling-serve
      ports:
        - "5001:5001"
      volumes:
        - docling_cache:/opt/app-root/src/.cache/docling
      environment:
        DOCLING_SERVE_ENABLE_UI: "true"
        NVIDIA_VISIBLE_DEVICES: "all"
        DOCLING_SERVE_ALLOW_DOWNLOADS: "true"
        DOCLING_SERVE_MAX_SYNC_WAIT: "600"
        UVICORN_WORKERS: "1"
      deploy:  # This section is for compatibility with Swarm
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
      runtime: nvidia
      restart: always

volumes:
  postgres_data:
  file_data:
  qdrant_data:
  docling_cache:
