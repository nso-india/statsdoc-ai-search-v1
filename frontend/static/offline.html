<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOSPI - Offline</title>
  <meta name="theme-color" content="#162f6a">
  <link rel="manifest" href="/manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #162f6a 0%, #1a3575 100%);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    
    .container {
      max-width: 400px;
      padding: 2rem;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      background: white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: #162f6a;
    }
    
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    
    p {
      opacity: 0.9;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .retry-btn {
      background: white;
      color: #162f6a;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
    }
    
    .offline-icon {
      width: 24px;
      height: 24px;
      margin: 0 auto 1rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">M</div>
    
    <div class="offline-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m1 9 2-2 2 2"></path>
        <path d="M9 1v6"></path>
        <path d="m15 1 2 2-2 2"></path>
        <path d="M22 9 20 7l-2 2"></path>
        <path d="M15 15v6"></path>
        <path d="m1 15 2 2 2-2"></path>
        <path d="m15 23 2-2 2 2"></path>
        <path d="M9 23v-6"></path>
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. 
      Don't worry - you can still browse your recent chats and conversations.
    </p>
    
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
  </div>
</body>
</html>
