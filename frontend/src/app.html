<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Montserrat:ital@0;1&display=swap" rel="stylesheet">
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Global override to prevent duplicate custom element registration -->
		<script>
			// Global override to prevent auto-registration conflicts
			if (typeof window !== 'undefined' && window.customElements) {
				const originalDefine = window.customElements.define.bind(window.customElements);
				const registeredElements = new Set();
				
				window.customElements.define = function(name, constructor, options) {
					if (registeredElements.has(name)) {
						console.warn(`Custom element ${name} already registered, skipping duplicate registration`);
						return;
					}
					
					try {
						registeredElements.add(name);
						return originalDefine(name, constructor, options);
					} catch (error) {
						if (error.name === 'NotSupportedError' && error.message.includes('already been used')) {
							console.warn(`Custom element ${name} was already registered elsewhere, skipping`);
							return;
						}
						throw error;
					}
				};
			}
		</script>
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div>%sveltekit.body%</div>
	</body>
</html>
